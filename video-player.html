<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeffAI Demo</title>
<style>
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
  }
  
  body { 
    background: #000; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  
  video { 
    max-width: 100%; 
    max-height: 100vh; 
    outline: none;
    display: block;
  }
  
  .loading {
    color: #fff;
    text-align: center;
    font-size: 14px;
    opacity: 0.7;
  }
  
  .loading.hidden {
    display: none;
  }
</style>
</head>
<body>
  <div class="loading" id="loading">Loading video...</div>
  
  <video 
    id="player" 
    controls 
    autoplay 
    playsinline 
    preload="auto"
    style="display:none;"
  >
    <source src="./video/Worker_efficiency_video_optimized.mp4" type="video/mp4">
    <source src="./video/Worker_efficiency_video_optimized.webm" type="video/webm">
    Your browser does not support the video tag.
  </video>

  <script>
    const video = document.getElementById('player');
    const loading = document.getElementById('loading');
    
    video.addEventListener('loadeddata', function() {
      loading.classList.add('hidden');
      video.style.display = 'block';
      video.play().catch(() => {
        video.style.display = 'block';
      });
    });
    
    setTimeout(() => {
      if (video.readyState < 2) {
        loading.classList.add('hidden');
        video.style.display = 'block';
      }
    }, 3000);
  </script>
</body>
</html>
